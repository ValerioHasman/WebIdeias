<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content, user-scalable=no" />
  <title>Chat monólogo</title>
  <link rel="icon" href="./favicon.png" type="image/png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="./style.css" />
  <script type="module" src="./script.js"></script>
</head>

<body>
  <div class="chat">
    <div id="cabeca" class="p-2 bg-secondary-subtle">
      <img src="./favicon.png" alt="Ícone" />
      <span>Monólogo</span>
    </div>
    <div id="conteudo"></div>
    <form id="form" class="input-group p-2 bg-secondary-subtle">
      <textarea name="mensagem" rows="1" class="form-control" placeholder="Enviar mensagem" required></textarea>
      <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i></button>
    </form>
  </div>
</body>

</html>
